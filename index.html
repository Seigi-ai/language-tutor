<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>言語 — Language Tutor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #07070e;
  --card: #0d0d1c;
  --border: rgba(140,130,255,0.12);
  --text: #ddddf5;
  --dim: #6060a0;
  --accent: #8b7cf7;
  --accent-dim: rgba(139,124,247,0.15);
  --user-bubble: rgba(139,124,247,0.12);
  --ai-bubble: rgba(255,255,255,0.04);
  --green: #4ade80;
  --red: #f87171;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; overflow:hidden; background:var(--bg); color:var(--text);
  font-family:'Space Mono',monospace; font-size:13px; }

/* ── SETUP ── */
#setup {
  position:fixed; inset:0; display:flex; align-items:center;
  justify-content:center; padding:28px; background:var(--bg); z-index:100;
}
.card { width:100%; max-width:380px; }
.big-title { font-family:'Shippori Mincho',serif; font-size:56px; font-weight:700;
  letter-spacing:-3px; color:#fff; line-height:1; }
.sub { color:var(--dim); font-size:10px; letter-spacing:.25em; text-transform:uppercase;
  margin:6px 0 44px; }
.label { font-size:10px; letter-spacing:.15em; text-transform:uppercase; color:var(--dim);
  margin-bottom:8px; }
input.field {
  width:100%; background:var(--card); border:1px solid var(--border); border-radius:10px;
  padding:13px 16px; color:var(--text); font-family:'Space Mono',monospace; font-size:13px;
  outline:none; margin-bottom:16px; transition:border-color .2s;
}
input.field:focus { border-color:var(--accent); }
.hint { font-size:10px; color:var(--dim); margin-bottom:24px; }
.hint a { color:var(--accent); text-decoration:none; }
.primary-btn {
  width:100%; background:var(--accent); color:#fff; border:none; border-radius:10px;
  padding:15px; font-family:'Space Mono',monospace; font-size:13px; font-weight:700;
  letter-spacing:.05em; cursor:pointer; transition:opacity .2s;
}
.primary-btn:active { opacity:.8; }

/* ── MAIN APP ── */
#app { height:100%; display:flex; flex-direction:column; }

.header {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 20px; border-bottom:1px solid var(--border); flex-shrink:0;
}
.header-left { display:flex; align-items:center; gap:12px; }
.header-title { font-family:'Shippori Mincho',serif; font-size:24px; font-weight:700; color:#fff; }
.status-pill {
  display:flex; align-items:center; gap:6px; padding:4px 10px;
  border-radius:20px; border:1px solid var(--border); font-size:10px; color:var(--dim);
}
.dot { width:6px; height:6px; border-radius:50%; background:var(--dim); transition:background .3s; }
.dot.ok { background:var(--green); }
.dot.err { background:var(--red); }
.dot.connecting { background:#facc15; animation:blink 1s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

.lang-bar {
  display:flex; gap:8px; padding:12px 20px; overflow-x:auto;
  scrollbar-width:none; flex-shrink:0; border-bottom:1px solid var(--border);
}
.lang-bar::-webkit-scrollbar { display:none; }
.lang-tab {
  display:flex; align-items:center; gap:6px; padding:6px 14px;
  border-radius:20px; border:1px solid var(--border); background:transparent;
  color:var(--dim); font-family:'Space Mono',monospace; font-size:11px;
  cursor:pointer; white-space:nowrap; transition:all .2s; flex-shrink:0;
}
.lang-tab.active { background:var(--accent); border-color:var(--accent); color:#fff; }

.transcript {
  flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column;
  gap:14px; scroll-behavior:smooth;
}
.transcript::-webkit-scrollbar { width:4px; }
.transcript::-webkit-scrollbar-track { background:transparent; }
.transcript::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

.placeholder {
  flex:1; display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:10px; color:var(--dim); text-align:center;
  pointer-events:none; user-select:none;
}
.placeholder-native { font-family:'Shippori Mincho',serif; font-size:40px;
  color:rgba(139,124,247,.25); line-height:1; margin-bottom:4px; }
.placeholder-hint { font-size:11px; letter-spacing:.05em; }

.msg {
  max-width:88%; padding:11px 15px; border-radius:14px;
  line-height:1.65; font-size:13px; word-break:break-word;
}
.msg.user {
  align-self:flex-end; background:var(--user-bubble);
  border:1px solid rgba(139,124,247,.28); color:#c8c0ff;
}
.msg.ai { align-self:flex-start; background:var(--ai-bubble); border:1px solid var(--border); }
.msg-who { font-size:9px; letter-spacing:.1em; text-transform:uppercase;
  color:var(--dim); margin-bottom:5px; }

.controls {
  padding:20px 20px 28px; display:flex; flex-direction:column;
  align-items:center; gap:10px; flex-shrink:0; border-top:1px solid var(--border);
}

.mic-btn {
  width:76px; height:76px; border-radius:50%;
  border:2px solid var(--accent); background:transparent;
  color:var(--accent); display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:all .2s; position:relative; flex-shrink:0;
}
.mic-btn.active {
  background:var(--accent); color:#fff;
  box-shadow:0 0 32px rgba(139,124,247,.4);
}
.mic-btn.active::before {
  content:''; position:absolute; inset:-10px; border-radius:50%;
  border:1.5px solid rgba(139,124,247,.35); animation:ring 2s ease-out infinite;
}
.mic-btn.active::after {
  content:''; position:absolute; inset:-20px; border-radius:50%;
  border:1.5px solid rgba(139,124,247,.18); animation:ring 2s ease-out infinite .4s;
}
@keyframes ring { 0%{opacity:1;transform:scale(1)} 100%{opacity:0;transform:scale(1.3)} }

.mic-label { font-size:10px; letter-spacing:.15em; text-transform:uppercase; color:var(--dim); }
.mic-label.active { color:var(--accent); }
</style>
</head>
<body>

<div id="setup">
  <div class="card">
    <div class="big-title">言語</div>
    <div class="sub">AI Language Tutor</div>
    <div class="label">Gemini API Key</div>
    <input class="field" id="api-key" type="password" placeholder="AIza...">
    <div class="hint">Get a free key at <a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com/apikey</a></div>
    <button class="primary-btn" id="start-btn">Begin Session →</button>
  </div>
</div>

<div id="app" style="display:none">
  <div class="header">
    <div class="header-left">
      <div class="header-title">言語</div>
      <div class="status-pill"><div class="dot" id="dot"></div><span id="status-text">idle</span></div>
    </div>
  </div>
  <div class="lang-bar" id="lang-bar"></div>
  <div class="transcript" id="transcript">
    <div class="placeholder" id="placeholder">
      <div class="placeholder-native" id="native-text">日本語</div>
      <div class="placeholder-hint">tap the mic and start speaking</div>
    </div>
  </div>
  <div class="controls">
    <button class="mic-btn" id="mic-btn">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
        <rect x="9" y="2" width="6" height="11" rx="3"/>
        <path d="M5 10a7 7 0 0 0 14 0M12 19v3M9 22h6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/>
      </svg>
    </button>
    <div class="mic-label" id="mic-label">tap to speak</div>
  </div>
</div>

<script>
// ── LANGUAGES (With Dynamic English-Switching Prompts) ─────────────────────
const LANGS = {
  japanese: {
    name:'Japanese', native:'日本語', flag:'🇯🇵',
    prompt:`You are Hana, a warm Japanese language tutor.
Dynamic Flow Rules:
- If the user speaks to you in English: Respond completely in English. Use this mode to explain Japanese concepts, translate phrases, or answer their questions clearly.
- If the user speaks to you in Japanese: Respond completely in natural Japanese (1–2 sentences max) to maintain the conversational immersion.
- If they make a clear grammatical error in Japanese, append a new line: ✏️ [brief English correction]`
  },
  french: {
    name:'French', native:'Français', flag:'🇫🇷',
    prompt:`You are Léa, a warm French language tutor.
Dynamic Flow Rules:
- If the user speaks to you in English: Respond completely in English. Use this mode to explain French concepts, translate phrases, or answer their questions clearly.
- If the user speaks to you in French: Respond completely in natural French (1–2 sentences max) to maintain the conversational immersion.
- If they make a clear grammatical error in French, append a new line: ✏️ [brief English correction]`
  },
  spanish: {
    name:'Spanish', native:'Español', flag:'🇪🇸',
    prompt:`You are Sofía, a warm Spanish language tutor.
Dynamic Flow Rules:
- If the user speaks to you in English: Respond completely in English. Use this mode to explain Spanish concepts, translate phrases, or answer their questions clearly.
- If the user speaks to you in Spanish: Respond completely in natural Spanish (1–2 sentences max) to maintain the conversational immersion.
- If they make a clear grammatical error in Spanish, append a new line: ✏️ [brief English correction]`
  },
  chinese: {
    name:'Chinese', native:'中文', flag:'🇨🇳',
    prompt:`You are Wei, a warm Mandarin language tutor.
Dynamic Flow Rules:
- If the user speaks to you in English: Respond completely in English. Use this mode to explain Mandarin concepts, translate characters, or answer their questions clearly.
- If the user speaks to you in Mandarin: Respond completely in natural Mandarin (1–2 sentences max) to maintain the conversational immersion.
- If they make a clear error in Mandarin, append a new line: ✏️ [brief English correction with pinyin]`
  },
};

const MODEL = 'models/gemini-3.1-flash-live-preview';

// ── AUDIO WORKLET (PCM16 capture) ──────────────────────────────────────────
const WORKLET = `
class PCMProcessor extends AudioWorkletProcessor {
  process(inputs) {
    const ch = inputs[0] && inputs[0][0];
    if (ch) {
      const i16 = new Int16Array(ch.length);
      for (let i = 0; i < ch.length; i++) {
        const s = Math.max(-1, Math.min(1, ch[i]));
        i16[i] = s < 0 ? s * 32768 : s * 32767;
      }
      this.port.postMessage(i16.buffer, [i16.buffer]);
    }
    return true;
  }
}
registerProcessor('pcm-proc', PCMProcessor);
`;

// ── HELPERS ────────────────────────────────────────────────────────────────
const buf2b64 = buf => {
  let s = ''; const u = new Uint8Array(buf);
  for (let i = 0; i < u.length; i++) s += String.fromCharCode(u[i]);
  return btoa(s);
};
const b64toI16 = b64 => {
  const s = atob(b64); const buf = new ArrayBuffer(s.length);
  const v = new Uint8Array(buf);
  for (let i = 0; i < s.length; i++) v[i] = s.charCodeAt(i);
  return new Int16Array(buf);
};
const i16toF32 = i16 => {
  const f = new Float32Array(i16.length);
  for (let i = 0; i < i16.length; i++) f[i] = i16[i] / 32768;
  return f;
};

// ── STATE ──────────────────────────────────────────────────────────────────
let apiKey = '', ws = null, inCtx = null, outCtx = null;
let micStream = null, worklet = null, src = null;
let micOn = false, wsReady = false, playAt = 0;
let curLang = 'japanese', curAiEl = null;

const $ = id => document.getElementById(id);

// ── STATUS ─────────────────────────────────────────────────────────────────
function setStatus(state, label) {
  const dot = $('dot'), txt = $('status-text');
  dot.className = 'dot' + (state ? ' '+state : '');
  txt.textContent = label;
}

// ── LANG BAR ──────────────────────────────────────────────────────────────
function buildBar() {
  const bar = $('lang-bar'); bar.innerHTML = '';
  Object.entries(LANGS).forEach(([k, l]) => {
    const b = document.createElement('button');
    b.className = 'lang-tab' + (k === curLang ? ' active' : '');
    b.textContent = l.flag + ' ' + l.native;
    b.onclick = () => switchLang(k);
    bar.appendChild(b);
  });
}

function switchLang(k) {
  if (k === curLang) return;
  curLang = k; buildBar();
  $('native-text').textContent = LANGS[k].native;
  clearTranscript();
  if (ws) { ws.close(); ws = null; }
  connect();
}

// ── TRANSCRIPT ─────────────────────────────────────────────────────────────
function clearTranscript() {
  const t = $('transcript'); t.innerHTML = '';
  const ph = document.createElement('div'); ph.className = 'placeholder'; ph.id = 'placeholder';
  ph.innerHTML = `<div class="placeholder-native" id="native-text">${LANGS[curLang].native}</div>
    <div class="placeholder-hint">tap the mic and start speaking</div>`;
  t.appendChild(ph); curAiEl = null;
}

function hidePH() {
  const ph = $('placeholder'); if (ph) ph.remove();
}

function addMsg(role, text) {
  if (!text.trim()) return;
  hidePH();
  const t = $('transcript');
  const d = document.createElement('div');
  d.className = 'msg ' + role;
  d.innerHTML = `<div class="msg-who">${role === 'user' ? 'you' : LANGS[curLang].name + ' tutor'}</div>${text}`;
  t.appendChild(d); t.scrollTop = t.scrollHeight; return d;
}

function startAiMsg() {
  hidePH();
  const t = $('transcript');
  curAiEl = document.createElement('div');
  curAiEl.className = 'msg ai';
  curAiEl.innerHTML = `<div class="msg-who">${LANGS[curLang].name} tutor</div><span class="body"></span>`;
  t.appendChild(curAiEl); t.scrollTop = t.scrollHeight;
}

function appendAi(text) {
  if (!curAiEl) startAiMsg();
  curAiEl.querySelector('.body').textContent += text;
  $('transcript').scrollTop = $('transcript').scrollHeight;
}

function endAiMsg() { curAiEl = null; playAt = 0; }

// ── WEBSOCKET ──────────────────────────────────────────────────────────────
function connect() {
  setStatus('connecting', 'connecting…');
  const url = `wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1beta.GenerativeService.BidiGenerateContent?key=${apiKey}`;
  ws = new WebSocket(url);
  wsReady = false;

  ws.onopen = () => {
    ws.send(JSON.stringify({
      setup: {
        model: MODEL,
        generationConfig: {
          responseModalities: ['AUDIO'],
          speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: 'Aoede' } } }
        },
        inputAudioTranscription: {},
        outputAudioTranscription: {},
        systemInstruction: { parts: [{ text: LANGS[curLang].prompt }] }
      }
    }));
  };

  ws.onmessage = async e => {
    let msg;
    try {
      const raw = typeof e.data === 'string' ? e.data : await e.data.text();
      msg = JSON.parse(raw);
    } catch { return; }

    if (msg.setupComplete) { wsReady = true; setStatus('ok', 'connected'); return; }

    const sc = msg.serverContent;
    if (!sc) return;

    // Audio/text parts from model
    if (sc.modelTurn?.parts) {
      for (const p of sc.modelTurn.parts) {
        if (p.text) appendAi(p.text);
        if (p.inlineData?.mimeType?.startsWith('audio/pcm')) playChunk(p.inlineData.data);
      }
    }

    // Input transcription (what user said)
    if (sc.inputTranscription?.text) {
      addMsg('user', sc.inputTranscription.text);
    }

    if (sc.turnComplete) endAiMsg();
  };

  ws.onerror = () => setStatus('err', 'error');
  ws.onclose = (e) => { wsReady = false; setStatus('err', 'disconnected: ' + (e.reason || e.code || 'unknown')); };
}

// ── AUDIO PLAYBACK ─────────────────────────────────────────────────────────
function ensureOut() {
  if (!outCtx) outCtx = new AudioContext({ sampleRate: 24000 });
  if (outCtx.state === 'suspended') outCtx.resume();
}

function playChunk(b64) {
  ensureOut();
  const f32 = i16toF32(b64toI16(b64));
  const buf = outCtx.createBuffer(1, f32.length, 24000);
  buf.getChannelData(0).set(f32);
  const src2 = outCtx.createBufferSource();
  src2.buffer = buf; src2.connect(outCtx.destination);
  const now = outCtx.currentTime;
  const t = Math.max(now, playAt);
  src2.start(t); playAt = t + buf.duration;
}

// ── MICROPHONE ─────────────────────────────────────────────────────────────
async function startMic() {
  if (!inCtx) {
    inCtx = new AudioContext({ sampleRate: 16000 });
    const blob = new Blob([WORKLET], { type: 'application/javascript' });
    await inCtx.audioWorklet.addModule(URL.createObjectURL(blob));
  }
  if (inCtx.state === 'suspended') await inCtx.resume();

  micStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
  src = inCtx.createMediaStreamSource(micStream);
  worklet = new AudioWorkletNode(inCtx, 'pcm-proc');

  // Silent output node to keep graph active
  const silent = inCtx.createGain(); silent.gain.value = 0;
  src.connect(worklet); worklet.connect(silent); silent.connect(inCtx.destination);

  worklet.port.onmessage = ev => {
    if (!ws || ws.readyState !== 1 || !wsReady) return;
    
    // ── ECHO & STT HALLUCINATION FIX ──
    // Drop mic data frames if the AI speaker buffer timeline extends into the future
    if (outCtx && outCtx.currentTime < playAt) {
      return;
    }

    ws.send(JSON.stringify({
      realtimeInput: { audio: { data: buf2b64(ev.data), mimeType: 'audio/pcm;rate=16000' } }
    }));
  };
}

function stopMic() {
  if (src) { src.disconnect(); src = null; }
  if (worklet) { worklet.disconnect(); worklet = null; }
  if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
}

async function toggleMic() {
  const btn = $('mic-btn'), lbl = $('mic-label');
  if (micOn) {
    micOn = false; stopMic();
    btn.classList.remove('active');
    lbl.textContent = 'tap to speak'; lbl.className = 'mic-label';
  } else {
    try {
      await startMic();
      micOn = true;
      btn.classList.add('active');
      lbl.textContent = 'listening…'; lbl.className = 'mic-label active';
    } catch {
      alert('Microphone access denied. Please allow mic in browser settings.');
    }
  }
}

// ── INIT ───────────────────────────────────────────────────────────────────
buildBar();
$('mic-btn').onclick = toggleMic;

const saved = localStorage.getItem('gem_k');
if (saved) $('api-key').value = saved;

$('api-key').addEventListener('keydown', e => { if (e.key === 'Enter') $('start-btn').click(); });

$('start-btn').onclick = () => {
  apiKey = $('api-key').value.trim();
  if (!apiKey) { $('api-key').focus(); return; }
  localStorage.setItem('gem_k', apiKey);
  $('setup').style.display = 'none';
  $('app').style.display = 'flex';
  connect();
};
</script>
</body>
</html>
